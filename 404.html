<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Halaman Tidak Ditemukan | BUFATECHNO</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/logo.ico?v=1.0">
    <link rel="icon" type="image/png" href="/logo.png?v=1.0">

    <style>
        :root {
            --primary: #c71313;
            --primary-dark: #a00e0e;
            --dark: #0e0c0b;
            --darker: #050505;
            --light: #e8e8e7;
            --gray: #8C8CA1;
            --gradient-primary: linear-gradient(135deg, var(--primary), #e74c3c);
            --gradient-dark: linear-gradient(135deg, var(--dark), #1a1a1a);
            --font-primary: 'Inter', sans-serif;
            --transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-primary);
            background: var(--gradient-dark);
            color: var(--light);
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-align: center;
        }

        /* Background Elements */
        .bg-elements { position: fixed; inset: 0; z-index: -1; }
        .bg-element { position: absolute; border-radius: 50%; background: var(--gradient-primary); opacity: 0.1; filter: blur(80px); animation: float 15s infinite alternate ease-in-out; }
        .bg-1 { width: 600px; height: 600px; top: -10%; right: -10%; }
        .bg-2 { width: 400px; height: 400px; bottom: -10%; left: -5%; animation-delay: -5s; }
        @keyframes float { 0% { transform: translate(0, 0); } 100% { transform: translate(50px, 30px); } }

        .grid-pattern {
            position: fixed; inset: 0; z-index: -1;
            background-image: linear-gradient(rgba(199, 19, 19, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(199, 19, 19, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .error-container {
            padding: 2rem;
            max-width: 600px;
            z-index: 1;
        }

        .error-code {
            font-size: clamp(8rem, 15vw, 12rem);
            font-weight: 900;
            line-height: 1;
            margin-bottom: 1rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 10px 20px rgba(199, 19, 19, 0.3));
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); filter: drop-shadow(0 10px 20px rgba(199, 19, 19, 0.3)); }
            to { transform: scale(1.02); filter: drop-shadow(0 15px 30px rgba(199, 19, 19, 0.5)); }
        }

        .error-title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            letter-spacing: -0.5px;
        }

        .error-desc {
            color: var(--gray);
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            background: var(--gradient-primary);
            color: white;
            text-decoration: none;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            transition: var(--transition);
            box-shadow: 0 10px 20px rgba(199, 19, 19, 0.3);
        }

        .btn-home:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(199, 19, 19, 0.5);
            color: white;
        }

        .brand-top {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .footer-logo {
            width: 50px;
            height: 50px;
            object-fit: contain;
        }

        .footer-brand-text {
            font-size: 1.8rem;
            letter-spacing: -0.5px;
        }

        .bufa { color: var(--primary); font-weight: 800; text-shadow: 0 0 15px rgba(199, 19, 19, 0.4); }
        .techno { color: var(--light); font-weight: 800; }

        @media (max-width: 767px) {
            .error-code { font-size: 8rem; }
            .error-title { font-size: 1.5rem; }
            .error-desc { font-size: 0.95rem; }
            .footer-brand-text { font-size: 1.4rem; }
            .footer-logo { width: 40px; height: 40px; }
        }
    </style>
</head>

<body>
    <div class="bg-elements">
        <div class="bg-element bg-1"></div>
        <div class="bg-element bg-2"></div>
    </div>
    <div class="grid-pattern"></div>

    <div class="error-container" data-aos="zoom-in">
        <div class="brand-top">
            <img src="/logo.png" alt="Logo" class="footer-logo">
            <div class="footer-brand-text">
                <span class="bufa">BUFA</span><span class="techno">TECHNO</span>
            </div>
        </div>

        <div class="error-code">404</div>
        <h1 class="error-title">Halaman Tidak Ditemukan</h1>
        <p class="error-desc">
            Sepertinya halaman yang Anda cari telah dipindahkan, dihapus, atau tidak pernah ada. 
            Mari kembali ke beranda untuk menemukan apa yang Anda butuhkan.
        </p>
        
        <a href="/" class="btn-home">
            <i class="fas fa-home"></i>
            <span>Kembali ke Beranda</span>
        </a>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 1000,
            once: true
        });
    </script>
</body>

</html>
